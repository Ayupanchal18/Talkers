# Render Blueprint for vidss - Video Calling Platform
# This file defines all services needed for deployment

services:
  # Backend API + Socket.IO Server
  - type: web
    name: vidss-backend
    runtime: node
    region: oregon # or any region you prefer: oregon, frankfurt, singapore, ohio
    plan: free # free tier - spins down after 15 min inactivity
    buildCommand: cd server && npm install --include=dev && npx prisma generate && npm run build
    startCommand: cd server && npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: vidss-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render will auto-generate secure secret
      - key: JWT_REFRESH_SECRET
        generateValue: true # Render will auto-generate secure secret
      - key: FRONTEND_URL
        fromService:
          type: web
          name: vidss-frontend
          property: host

  # Frontend React App
  - type: web
    name: vidss-frontend
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://vidss-backend.onrender.com

databases:
  # PostgreSQL Database
  - name: vidss-db
    databaseName: vidss
    plan: free # 90-day free tier, then renew
    region: oregon # should match backend region for best performance
